<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Pro Elite | Cotizador Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5eead4;
            --bg-body: #064e3b;
            --bg-card: rgba(1, 25, 20, 0.95);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Lexend', sans-serif;
            background: var(--bg-body);
            background: radial-gradient(circle at center, #065f46 0%, #022c22 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-light);
            padding: 15px;
        }

        .skin-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 35px;
            padding: 2.5rem 1.5rem;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 640px) {
            .skin-card { padding: 3.5rem; border-radius: 50px; }
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1.5px; color: white; }
        .header p { color: var(--primary); font-size: 0.75rem; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; margin-top: 0.5rem; }

        .section-title {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            text-align: center;
        }

        .form-row { margin-bottom: 1.5rem; }

        .counter-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 8px;
            border-radius: 20px;
        }

        .btn-round {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-round:hover { background: var(--primary); color: #022c22; }
        .counter-val { font-size: 1.8rem; font-weight: 800; }

        .input-style {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: white;
            font-family: inherit;
            text-align: center;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-style:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.08); }

        select.input-style { cursor: pointer; text-align-last: center; }

        .results-section {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 25px;
            padding: 1.5rem;
            margin: 2rem 0;
            text-align: center;
        }

        .price-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
        .price-val { font-size: 2.2rem; font-weight: 800; color: white; margin: 0.4rem 0; }
        .roi-tag { background: var(--primary); color: #022c22; padding: 6px 16px; border-radius: 100px; font-size: 0.8rem; font-weight: 800; }

        .contact-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 1rem; }
        @media (min-width: 400px) { .contact-grid { grid-template-columns: 1fr 1fr; } }

        .btn-main {
            width: 100%;
            padding: 1.2rem;
            background: var(--primary);
            color: #022c22;
            border: none;
            border-radius: 18px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(94, 234, 212, 0.2); }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

        .optional-text { font-size: 0.65rem; color: var(--text-dim); font-style: italic; }

        option { background: #011914; color: white; }

        #msg-status { text-align: center; font-size: 0.8rem; margin-top: 15px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="skin-card">
        <header class="header">
            <p>Eco Intelligence</p>
            <h1>Solar Pro</h1>
        </header>

        <div class="form-row">
            <span class="section-title">Consumo (kWh/Mes)</span>
            <input type="number" id="consumo" value="300" class="input-style">
        </div>

        <div class="form-row">
            <span class="section-title">Modalidad</span>
            <select id="modalidad" class="input-style">
                <option value="hibrido">Híbrido (Paneles + Baterías)</option>
                <option value="on-grid">On-Grid (Solo Paneles)</option>
                <option value="respaldo">Respaldo (Solo Baterías)</option>
            </select>
        </div>

        <div class="form-row">
            <span class="section-title">Cantidad de Paneles</span>
            <div class="counter-box">
                <button class="btn-round" onclick="change('paneles', -1)">−</button>
                <div class="counter-val" id="val-paneles">6</div>
                <button class="btn-round" onclick="change('paneles', 1)">+</button>
            </div>
        </div>

        <div class="form-row">
            <span class="section-title">Unidades de Batería</span>
            <div class="counter-box">
                <button class="btn-round" onclick="change('baterias', -1)">−</button>
                <div class="counter-val" id="val-baterias">1</div>
                <button class="btn-round" onclick="change('baterias', 1)">+</button>
            </div>
        </div>

        <div class="results-section">
            <span class="price-label">Inversión Estimada</span>
            <span class="price-val" id="res-total">$ 0</span>
            <br>
            <div class="roi-tag" id="viability">ROI: --- AÑOS</div>
        </div>

        <div id="contact-section">
            <span class="section-title">Finalizar Cotización</span>
            <div class="form-row">
                <input type="text" id="cliente-nombre" placeholder="Nombre Completo" class="input-style">
            </div>
            <div class="contact-grid">
                <input type="text" id="cliente-whatsapp" placeholder="WhatsApp" class="input-style">
                <div>
                    <input type="email" id="cliente-email" placeholder="Correo (Opcional)" class="input-style">
                </div>
            </div>
            <button id="btn-cotizar" class="btn-main">COTIZACION</button>
            <div id="msg-status"></div>
        </div>
    </div>

    <script>
        let state = {
            consumo: 300,
            modalidad: 'hibrido',
            paneles: 6,
            baterias: 1
        };

        const formatter = new Intl.NumberFormat('es-CO', {
            style: 'currency', currency: 'COP', minimumFractionDigits: 0
        });

        function change(key, val) {
            state[key] = Math.max(0, state[key] + val);
            document.getElementById(`val-${key}`).innerText = state[key];
            updateUI();
        }

        document.getElementById('consumo').addEventListener('input', (e) => {
            state.consumo = parseFloat(e.target.value) || 0;
            updateUI();
        });

        document.getElementById('modalidad').addEventListener('change', (e) => {
            state.modalidad = e.target.value;
            updateUI();
        });

        document.getElementById('btn-cotizar').addEventListener('click', async () => {
            const nombre = document.getElementById('cliente-nombre').value;
            const whatsapp = document.getElementById('cliente-whatsapp').value;
            const email = document.getElementById('cliente-email').value;
            const status = document.getElementById('msg-status');
            const btn = document.getElementById('btn-cotizar');

            if (!nombre || !whatsapp) {
                alert("Por favor completa Nombre y WhatsApp para continuar.");
                return;
            }

            btn.disabled = true;
            status.innerText = "Procesando envío multi-canal...";
            status.style.color = "var(--primary)";

            try {
                const response = await fetch('/api/enviar-pdf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ...state,
                        cliente_nombre: nombre,
                        cliente_whatsapp: whatsapp,
                        cliente_email: email,
                        vendedor: "Ingeniero Solar Pro",
                        fecha: new Date().toLocaleDateString('es-CO')
                    })
                });

                if (response.ok) {
                    status.innerText = "¡Enviado! Revisa tu WhatsApp" + (email ? " y Correo." : ".");
                    status.style.color = "#4ade80";
                } else {
                    throw new Error();
                }
            } catch (e) {
                status.innerText = "Error en el envío. Intenta nuevamente.";
                status.style.color = "#f87171";
            } finally {
                btn.disabled = false;
            }
        });

        async function updateUI() {
            try {
                const response = await fetch('/api/cotizar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(state)
                });
                const res = await response.json();
                document.getElementById('res-total').innerText = formatter.format(res.total_cotizacion);
                document.getElementById('viability').innerText = `ROI: ${res.roi_anios} AÑOS`;
            } catch (e) {
                console.error(e);
            }
        }

        window.onload = updateUI;
    </script>
</body>
</html>
