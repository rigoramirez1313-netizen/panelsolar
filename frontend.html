<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Pro Elite | Cotizador</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #5eead4;
            --bg-body: #064e3b;
            --bg-card: rgba(1, 25, 20, 0.95);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Lexend', sans-serif;
            background: radial-gradient(circle at center, #065f46 0%, #022c22 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-light);
            padding: 15px;
        }

        .skin-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 35px;
            padding: 2.5rem 1.5rem;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1.5px; color: white; }
        .header p { color: var(--primary); font-size: 0.75rem; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; }

        .form-row { margin-bottom: 1.2rem; }
        .section-title { display: block; font-size: 0.7rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.8rem; text-align: center; }

        .counter-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .btn-step {
            width: 45px; height: 45px; border-radius: 12px; border: none;
            background: rgba(255,255,255,0.05); color: white; font-size: 1.2rem; cursor: pointer;
        }
        .btn-step:hover { background: var(--primary); color: #022c22; }

        .input-style {
            width: 100%; padding: 0.8rem; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border); border-radius: 12px; color: white;
            font-family: inherit; text-align: center;
        }

        .results-section {
            background: rgba(0, 0, 0, 0.25); border-radius: 25px; padding: 1.5rem; margin: 1.5rem 0; text-align: center;
        }
        .price-val { font-size: 2rem; font-weight: 800; color: white; margin: 0.2rem 0; }
        .roi-tag { background: var(--primary); color: #022c22; padding: 5px 15px; border-radius: 100px; font-size: 0.75rem; font-weight: 800; }

        .btn-main {
            width: 100%; padding: 1rem; border: none; border-radius: 15px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s;
            margin-bottom: 10px;
        }

        .btn-pdf { background: #fff; color: #022c22; }
        .btn-wa { background: #25D366; color: white; display: none; }

        #msg-status { text-align: center; font-size: 0.75rem; margin-top: 10px; color: var(--primary); }
    </style>
</head>
<body>
    <div class="skin-card">
        <header class="header">
            <p>ECO INTELLIGENCE</p>
            <h1>Solar Pro</h1>
        </header>

        <div class="form-row">
            <span class="section-title">Consumo kWh/Mes</span>
            <input type="number" id="consumo" value="300" class="input-style">
        </div>

        <div class="form-row">
            <span class="section-title">Modalidad</span>
            <select id="modalidad" class="input-style">
                <option value="hibrido">Híbrido (Paneles + Baterías)</option>
                <option value="on-grid">On-Grid (Solo Paneles)</option>
                <option value="respaldo">Respaldo (Solo Baterías)</option>
            </select>
        </div>

        <div class="form-row">
            <span class="section-title">Cantidad de Paneles</span>
            <div class="counter-box">
                <button class="btn-step" onclick="change('paneles', -1)">−</button>
                <span id="val-paneles" style="font-size: 1.5rem; font-weight: 800;">6</span>
                <button class="btn-step" onclick="change('paneles', 1)">+</button>
            </div>
        </div>

        <div class="form-row">
            <span class="section-title">Unidades de Batería</span>
            <div class="counter-box">
                <button class="btn-step" onclick="change('baterias', -1)">−</button>
                <span id="val-baterias" style="font-size: 1.5rem; font-weight: 800;">1</span>
                <button class="btn-step" onclick="change('baterias', 1)">+</button>
            </div>
        </div>

        <div class="results-section">
            <span style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;">Inversión Estimada</span>
            <div class="price-val" id="res-total">$ 0</div>
            <div class="roi-tag" id="viability">ROI: --- AÑOS</div>
        </div>

        <div class="form-row">
            <input type="text" id="cliente-nombre" placeholder="Nombre del Cliente" class="input-style">
        </div>
        <div class="form-row">
            <input type="text" id="cliente-whatsapp" placeholder="WhatsApp" class="input-style">
        </div>
        <div class="form-row">
            <input type="email" id="cliente-email" placeholder="Correo Electrónico (Opcional)" class="input-style">
        </div>

        <button id="btn-gen-pdf" class="btn-main btn-pdf">GENERAR COTIZACION</button>
        <button id="btn-send-wa" class="btn-main btn-wa">ENVIAR POR WHATSAPP</button>
        
        <div id="msg-status"></div>
    </div>

    <script>
        let state = { consumo: 300, modalidad: 'hibrido', paneles: 6, baterias: 1 };
        const formatter = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 });

        function change(key, val) {
            state[key] = Math.max(0, state[key] + val);
            document.getElementById(`val-${key}`).innerText = state[key];
            updateUI();
        }

        document.getElementById('consumo').addEventListener('input', (e) => {
            state.consumo = parseFloat(e.target.value) || 0;
            updateUI();
        });

        document.getElementById('modalidad').addEventListener('change', (e) => {
            state.modalidad = e.target.value;
            updateUI();
        });

        async function updateUI() {
            try {
                const response = await fetch('/api/cotizar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(state)
                });
                const res = await response.json();
                document.getElementById('res-total').innerText = formatter.format(res.total_cotizacion);
                document.getElementById('viability').innerText = `ROI: ${res.roi_anios} AÑOS`;
            } catch (e) { console.error(e); }
        }

        document.getElementById('btn-gen-pdf').addEventListener('click', () => {
            const nombre = document.getElementById('cliente-nombre').value;
            const email = document.getElementById('cliente-email').value;
            if (!nombre) { alert("Ingresa el nombre del cliente."); return; }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const total = document.getElementById('res-total').innerText;
            const roi = document.getElementById('viability').innerText;
            const fecha = new Date().toLocaleDateString('es-CO');

            // --- DISEÑO CORPORATIVO PDF ---
            doc.setFillColor(6, 78, 59); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22); doc.setFont("helvetica", "bold");
            doc.text("SOLAR PRO COLOMBIA", 20, 25);
            doc.setFontSize(10); doc.setFont("helvetica", "normal");
            doc.text("Energía Inteligente y Sostenible", 20, 32);
            doc.text("NIT: 900.123.456-7 | contacto@solarpro.co", 120, 25);

            doc.setTextColor(0, 0, 0);
            doc.setFontSize(18); doc.setFont("helvetica", "bold");
            doc.text("COTIZACIÓN TÉCNICA COMERCIAL", 105, 55, { align: "center" });

            doc.setFillColor(240, 240, 240); doc.rect(20, 65, 170, 25, 'F');
            doc.setFontSize(11); doc.text("INFORMACIÓN DEL CLIENTE:", 25, 72);
            doc.setFont("helvetica", "normal");
            doc.text(`Nombre: ${nombre.toUpperCase()}`, 25, 78);
            if(email) doc.text(`Email: ${email}`, 25, 84);
            doc.text(`Fecha: ${fecha}`, 110, 78);

            doc.setFont("helvetica", "bold"); doc.text("DESCRIPCIÓN DEL SISTEMA", 20, 105);
            doc.line(20, 107, 190, 107);
            doc.setFont("helvetica", "normal");
            let y = 115;
            const items = [
                ["Consumo Energético:", `${state.consumo} kWh/mes`],
                ["Modalidad:", state.modalidad.toUpperCase()],
                ["Paneles Solares (550W):", `${state.paneles} Unidades`],
                ["Baterías de Litio:", `${state.baterias} Unidades`],
                ["Ingeniería e Instalación:", "Incluido"]
            ];
            items.forEach(item => {
                doc.text(item[0], 25, y); doc.setFont("helvetica", "bold"); doc.text(item[1], 110, y); doc.setFont("helvetica", "normal"); y += 8;
            });

            doc.setFillColor(94, 234, 212); doc.rect(20, 160, 170, 35, 'F');
            doc.setFontSize(14); doc.setTextColor(2, 44, 34); doc.text("VALOR TOTAL INVERSIÓN:", 30, 175);
            doc.setFontSize(22); doc.text(total, 30, 187);
            doc.setFontSize(11); doc.text("RETORNO (ROI):", 120, 175); doc.text(roi, 120, 183);

            doc.save(`Cotizacion_${nombre.replace(' ','_')}.pdf`);
            document.getElementById('btn-send-wa').style.display = 'block';
            document.getElementById('msg-status').innerText = "PDF Corporativo listo.";
        });

        document.getElementById('btn-send-wa').addEventListener('click', () => {
            const nombre = document.getElementById('cliente-nombre').value;
            const wa = document.getElementById('cliente-whatsapp').value;
            const msg = encodeURIComponent(`Hola ${nombre}, envío tu cotización Solar Pro.\n\n` +
                        `Paneles: ${state.paneles}\nBaterías: ${state.baterias}\nTotal: ${document.getElementById('res-total').innerText}\n\nAdjunto PDF.`);
            window.open(`https://api.whatsapp.com/send?phone=57${wa}&text=${msg}`, '_blank');
        });

        window.onload = updateUI;
    </script>
</body>
</html>
