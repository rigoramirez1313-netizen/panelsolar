[vars]
SUPABASE_URL = "https://spenxuctvscdtgjmlziy.supabase.co"
SUPABASE_KEY = "tu_clave_aqui"
FRONTEND_HTML = """<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Solar Pro Elite | Colombia</title><link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet"><style>:root{--primary:#5eead4;--bg-body:#064e3b;--bg-card:rgba(1,25,20,0.9);--glass-border:rgba(255,255,255,0.1);--text-light:#f1f5f9}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Lexend',sans-serif;background:var(--bg-body);background:radial-gradient(circle at center,#065f46 0%,#022c22 100%);height:100vh;display:flex;justify-content:center;align-items:center;color:var(--text-light)}.skin-card{background:var(--bg-card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:50px;padding:3.5rem;width:100%;max-width:520px;border:1px solid var(--glass-border);box-shadow:0 40px 80px rgba(0,0,0,0.6);position:relative;overflow:hidden}.skin-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,var(--primary),transparent)}.header{text-align:center;margin-bottom:3rem}.header h1{font-size:2.8rem;font-weight:800;letter-spacing:-2px;line-height:1;color:#fff}.header p{color:var(--primary);font-size:0.8rem;font-weight:600;letter-spacing:6px;text-transform:uppercase;margin-top:0.8rem}.form-row{margin-bottom:2.5rem}.label-style{display:block;font-size:0.75rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:2px;margin-bottom:1.2rem;text-align:center}.counter-box{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.03);border:1px solid var(--glass-border);padding:10px;border-radius:24px}.btn-round{width:55px;height:55px;border-radius:18px;border:none;background:rgba(255,255,255,0.05);color:#fff;font-size:1.5rem;font-weight:300;cursor:pointer;transition:all .3s}.btn-round:hover{background:var(--primary);color:#022c22}.counter-val{font-size:2.2rem;font-weight:800;color:#fff}.select-custom{width:100%;padding:1.2rem;background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);border-radius:20px;color:#fff;font-family:inherit;font-size:1rem;text-align:center;appearance:none}.results-section{background:rgba(0,0,0,0.2);border-radius:35px;padding:2.5rem;margin-top:3rem}.price-display{text-align:center}.price-label{font-size:0.8rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:3px}.price-val{font-size:2.8rem;font-weight:800;color:#fff;display:block;margin:0.5rem 0}.roi-tag{background:var(--primary);color:#022c22;padding:8px 20px;border-radius:100px;font-size:0.85rem;font-weight:800;display:inline-block}input[type=number]{width:100%;background:transparent;border:none;border-bottom:2px solid var(--glass-border);color:#fff;font-size:1.8rem;font-weight:800;text-align:center;padding:10px}.input-text{width:100%;padding:1rem;background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);border-radius:15px;color:#fff;font-family:inherit;margin-bottom:10px}.btn-main{width:100%;padding:1.2rem;background:var(--primary);color:var(--dark);border:none;border-radius:20px;font-weight:800;font-size:1rem;cursor:pointer;transition:all .3s;text-transform:uppercase;letter-spacing:2px}.btn-main:hover{transform:scale(1.02);box-shadow:0 10px 20px rgba(94,234,212,0.3)}input:focus{outline:0;border-color:var(--primary)}option{background:#011914;color:#fff}</style></head><body><div class="skin-card"><header class="header"><p>Sistemas Solares</p><h1>Solar Pro</h1></header><div class="form-row"><span class="label-style">Consumo Mensual (kWh)</span><input type="number" id="consumo" value="300"></div><div class="form-row"><span class="label-style">Modalidad</span><select id="modalidad" class="select-custom"><option value="hibrido">Híbrido (Paneles + Baterías)</option><option value="on-grid">On-Grid (Solo Paneles)</option><option value="respaldo">Respaldo (Solo Baterías)</option></select></div><div class="form-row"><span class="label-style">Cantidad de Paneles</span><div class="counter-box"><button class="btn-round" onclick="change('paneles',-1)">−</button><div class="counter-val" id="val-paneles">6</div><button class="btn-round" onclick="change('paneles',1)">+</button></div></div><div class="form-row"><span class="label-style">Unidades de Batería</span><div class="counter-box"><button class="btn-round" onclick="change('baterias',-1)">−</button><div class="counter-val" id="val-baterias">1</div><button class="btn-round" onclick="change('baterias',1)">+</button></div></div><div class="results-section"><div class="price-display"><span class="price-label">Inversión Estimada</span><span class="price-val" id="res-total">$ 0</span><div class="roi-tag" id="viability">ROI: --- AÑOS</div></div></div><div id="contact-form" style="margin-top:2rem;border-top:1px solid var(--glass-border);padding-top:2rem"><span class="label-style">Datos para el PDF</span><div class="form-row"><input type="text" id="cliente-nombre" placeholder="Nombre del Cliente" class="input-text"></div><div class="form-row"><input type="text" id="cliente-whatsapp" placeholder="WhatsApp (Ej: 3001234567)" class="input-text"></div><button id="btn-cotizar" class="btn-main">COTIZACION</button><p id="msg-status" style="text-align:center;font-size:0.8rem;margin-top:10px;color:var(--primary);display:none"></p></div></div><script>let state={consumo:300,modalidad:'hibrido',paneles:6,baterias:1};const formatter=new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0});function change(e,t){state[e]=Math.max(0,state[e]+t),document.getElementById(`val-${e}`).innerText=state[e],updateUI()}async function updateUI(){try{const e=await fetch('/api/cotizar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)}),t=await e.json();document.getElementById('res-total').innerText=formatter.format(t.total_cotizacion),document.getElementById('viability').innerText=`ROI: ${t.roi_anios} AÑOS`}catch(e){console.error(e)}}document.getElementById('consumo').addEventListener('input',e=>{state.consumo=parseFloat(e.target.value)||0,updateUI()}),document.getElementById('modalidad').addEventListener('change',e=>{state.modalidad=e.target.value,updateUI()}),document.getElementById('btn-cotizar').addEventListener('click',async()=>{const e=document.getElementById('cliente-nombre').value,t=document.getElementById('cliente-whatsapp').value,n=document.getElementById('msg-status');if(!e||!t)return void alert("Por favor completa los datos de contacto.");n.innerText="Enviando a WhatsApp...",n.style.display="block";try{const a=await fetch('/api/enviar-pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...state,cliente_nombre:e,cliente_whatsapp:t,vendedor:"Ingeniero Solar Pro"})});if(!a.ok)throw new Error;n.innerText="¡Listo! Recibirás el PDF en tu WhatsApp."}catch(e){n.innerText="Error al enviar. Intenta de nuevo."}}),window.onload=updateUI;</script></body></html>"""
